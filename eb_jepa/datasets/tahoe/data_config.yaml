# Tahoe-100M dataloader defaults (see eb_jepa/datasets/tahoe/dataset.py::TahoeConfig).
# A run's single config (examples/tahoe_jepa/cfgs/train.yaml) overrides these.

data_dir: /data/tahoe-100m        # parquet dir (raw expression_data or a cache)
split: train

# views (LeJEPA)
L: 4096                            # tokens per view (fixed shape for torch.compile)
n_views: 4
view_mode: drop                   # drop | mask
gene_keep_frac: 0.6               # drop: fraction of a cell's genes kept per view
gene_mask_frac: 0.3               # mask: fraction of kept genes whose count is hidden

# count encoding
count_mode: A                     # A continuous | B quantile bins
n_bins: 64                        # mode B
n_genes: 62710                    # Tahoe vocabulary size
pad_token_id: 0

# loader
batch_size: 32
num_workers: 8
pin_mem: true
seed: 0
max_cells: 0                      # 0 = all; >0 truncates for smoke runs
