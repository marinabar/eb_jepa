# Hepatotox perturbator — flow matching over the LIVER-finetuned encoder, with a
# hepatotoxicity virtual-pathway action featurizer (CYP / BSEP / NRF2 / mito-tox).
# Liver-only stream (Organ == "Liver"); only ~3 hepatic cell lines, so strata are
# few — large batch + modest min_source/min_target so per-stratum clouds form.
#
# Single GPU on Dalia:
#   /lustre/work/vivatech-unaite/ljung/venv-arm/bin/python -m \
#       examples.tahoe_perturbator.main run \
#       --config examples/tahoe_perturbator/cfgs/train_hepatotox.yaml

meta:
  seed: 0
  run_dir: /lustre/work/vivatech-unaite/ljung/runs/perturbator/hepatotox_liver

data:
  data_dir: /lustre/work/vivatech-unaite/shared/tahoe-100m/data
  split: train
  streaming: true
  shuffle_buffer: 16384
  batch_size: 512        # liver = few lines -> big batch so strata form
  num_workers: 8
  pin_mem: true
  max_cells: 0
  liver_only: true       # stream only hepatic cell lines (HepG2 / Huh-7 / ...)
  maps_path: /lustre/work/vivatech-unaite/shared/tahoe-cache/maps.pt

encoder:
  # Frozen LIVER-finetuned encoder (examples/tahoe_hepatotox/finetune.py).
  ckpt: /lustre/work/vivatech-unaite/ljung/runs/hepatotox/liver_finetune/encoder_final.pt
  gene_emb_cache: /lustre/work/vivatech-unaite/shared/gene_emb_cache
  # architecture below MUST match the checkpoint (sub14 small)
  d_model: 256
  n_heads: 4
  n_layers: 2
  d_ff: 1024
  proj_dim: 128
  num_bins: 16
  genes_per_bin: 32
  attention_activation: sigmoid

featurizer:
  type: hepatotox        # hepatotoxicity virtual-pathway action (+ dose channels)
  include_bsep: true
  include_descriptors: true
  cyp_use_alerts: true

model:                   # perturbator (velocity net, sized ~ sub14 small)
  depth: 4
  d_cond: 256
  cond_hidden: 512
  n_time_freqs: 64

loss:
  objective: flow_matching   # flow_matching | direct
  sw_slices: 256
  sw_p: 2
  min_source: 4          # liver strata are small -> modest mins so strata form
  min_target: 4
  ode_steps: 20
  ode_method: heun

memory:
  # Per-stratum latent memory bank. The encoder is frozen, so past detached latents
  # are exact extra samples of each stratum -> accumulate them across steps to grow
  # the per-step source/target clouds (critical for liver: only ~3 lines, so a batch
  # rarely holds both control AND treated cells of the same stratum).
  enabled: true
  capacity_per_key: 1024   # FIFO ring-buffer size per stratum key
  min_source: 8            # min combined (batch+bank) source cloud to compute the loss
  min_target: 8            # min combined target cloud
  warmup_steps: 50         # fill the bank before relying on it (still trains meanwhile)
  device: cpu              # keep buffers off the GPU; moved to compute device when used

optim:
  epochs: 50
  max_steps: 20000
  lr: 0.0005
  weight_decay: 0.01
  warmup_ratio: 0.05
  min_lr: 1.0e-6
  betas: [0.9, 0.95]
  max_grad_norm: 1.0

training:
  amp: true
  log_every: 25
  ckpt_every_epoch: true
  max_minutes: 600

eval:
  eval_every: 500
  eval_cells: 4000

wandb:
  enabled: true
  entity: unaite
  project: hacktheworld
