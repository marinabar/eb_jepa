# Perturbator training — one config drives the whole run.
# Frozen Subliminal-1.4 encoder + FiLM perturbator. Default objective = flow
# matching (rectified conditional flow matching, ODE inference); control matching
# is per stratum (cell_line_id, plate). See CLAUDE.md Part II.
#
# Sized to the small sub14 checkpoint on Dalia
# (/lustre/work/vivatech-unaite/ljung/runs/sub14/sub14_small/encoder.pt):
# d_model=256, n_layers=2, n_heads=4, num_bins=16, genes_per_bin=32.

meta:
  seed: 0
  run_dir: /lustre/work/vivatech-unaite/ljung/runs/perturbator/flow_small

data:
  data_dir: /lustre/work/vivatech-unaite/shared/tahoe-100m/data
  split: train
  streaming: true
  shuffle_buffer: 16384
  batch_size: 512        # big batch -> many cells per stratum for the OT distributions
  num_workers: 8
  pin_mem: true
  max_cells: 0
  maps_path: /lustre/work/vivatech-unaite/shared/tahoe-cache/maps.pt

encoder:
  # Frozen Subliminal-1.4 checkpoint (saved by examples/tahoe_jepa/sub14_main.py).
  ckpt: /lustre/work/vivatech-unaite/ljung/runs/sub14/sub14_small/encoder.pt
  gene_emb_cache: /lustre/work/vivatech-unaite/shared/gene_emb_cache
  # architecture below MUST match the checkpoint
  d_model: 256
  n_heads: 4
  n_layers: 2
  d_ff: 1024
  proj_dim: 128
  num_bins: 16
  genes_per_bin: 32
  attention_activation: sigmoid

featurizer:
  n_bits: 1024           # Morgan fingerprint length (hash fallback if no rdkit)
  radius: 2
  use_descriptors: true  # append MolWt/MolLogP/TPSA/HAcceptors/HDonors/RotBonds

model:                    # perturbator (velocity net, sized ~ sub14 small)
  depth: 4
  d_cond: 256            # action + time conditioning width (FiLM)
  cond_hidden: 512
  n_time_freqs: 64       # sinusoidal time-embedding frequencies (flow matching)

loss:
  objective: flow_matching   # flow_matching | direct
  # flow matching uses CFM (MSE on velocity); these apply to the direct objective
  # and to the eval sliced-W metric:
  sw_slices: 256         # sliced-Wasserstein projections
  sw_p: 2
  min_source: 4          # skip strata whose source/target is smaller than this
  min_target: 4
  ode_steps: 20          # ODE integration steps at eval/inference (flow matching)
  ode_method: heun       # euler | heun | midpoint

optim:
  epochs: 50
  max_steps: 20000       # >0 caps total optimizer steps
  lr: 0.0005
  weight_decay: 0.01
  warmup_ratio: 0.05
  min_lr: 1.0e-6
  betas: [0.9, 0.95]
  max_grad_norm: 1.0

training:
  amp: true              # bf16 autocast for the (frozen) encoder forward
  log_every: 25
  ckpt_every_epoch: true
  max_minutes: 600

eval:
  eval_every: 500
  eval_cells: 4000

wandb:
  enabled: true
  entity: unaite
  project: hacktheworld
