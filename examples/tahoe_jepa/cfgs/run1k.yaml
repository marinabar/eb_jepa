# 1000-step DDP run on 8x B200: torch.compile, real gene-emb cache + whole-dataset
# quantile bins, held-out probe split, periodic probes + t-SNE every 250 steps,
# FLOP + cells/tokens-seen metrics. torchrun --nproc_per_node=8.

meta:
  seed: 0
  run_dir: /data/runs/tahoe_jepa_1k

data:
  data_dir: /data/tahoe-cache/train
  split: train
  L: 4096
  n_views: 4
  view_mode: drop
  gene_keep_frac: 0.6
  gene_mask_frac: 0.3
  count_mode: A
  n_bins: 64
  n_genes: 62713
  batch_size: 24             # per GPU -> global 192
  num_workers: 6
  pin_mem: true
  quantile_bins: /data/tahoe-stats/quantile_bins
  maps_path: /data/tahoe-cache/maps.pt
  max_cells: 0

model:
  d_model: 1024
  n_layers: 12
  n_heads: 16
  n_kv_heads: 4
  use_cls: false
  readout: meanpool
  proj_hidden: 2048
  proj_dim: 128
  grad_checkpoint: false      # off so torch.compile path is clean; fits B200 at bs24
  compile: true               # torch.compile the encoder
  gene_emb_cache: /data/gene_emb_cache

loss:
  lamb: 0.02
  num_slices: 1024
  knots: 17
  t_max: 3.0

optim:
  epochs: 100                 # capped by optim.max_steps
  max_steps: 1000
  lr: 0.002
  weight_decay: 0.05
  warmup_ratio: 0.05
  min_lr: 1.0e-6
  betas: [0.9, 0.95]

training:
  amp: true
  log_every: 10
  ckpt_every_epoch: false
  max_minutes: 60             # safety cap; max_steps is the real limit

eval:
  enabled: true
  eval_cells: 2000            # held out from SSL training
  eval_every: 250            # probes + t-SNE every N steps (+ baseline at step 0)
  classes: [organ, cell_line_id, drug, moa_fine]
  encode_chunk: 128
  perplexity: 30.0

wandb:
  enabled: true
  entity: unaite
  project: hacktheworld
