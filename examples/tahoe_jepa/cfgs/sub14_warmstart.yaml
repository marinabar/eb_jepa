# Subliminal 1.4 WARM-START on Tahoe-100M — Dalia, multi-GPU GB200.
#
# Loads the trained cell-lejepa checkpoint (subliminal_1_4_F_v4.pt, the 4-view
# round-1 winner) into THIS port and continues training with OUR Evo2/ESMC gene
# features. The model MUST stay at the trained size (d=512/6L/8h, num_bins=16,
# proj_dim=128) for the weights to load — the whole sigmoid-attention body +
# projector + thermometer count table + [CELL] token are reused; only the
# Evo2/ESMC -> d_model input adapter is re-initialised (different feature space
# than 1.4's DNABERT/ESM), so it re-learns.
#
# Launch (after staging the checkpoint on Dalia — see scripts/dalia_sub14.sbatch):
#   torchrun --nproc_per_node=4 -m examples.tahoe_jepa.sub14_main run \
#       --config examples/tahoe_jepa/cfgs/sub14_warmstart.yaml

meta:
  seed: 0
  run_dir: /lustre/work/vivatech-unaite/ljung/runs/sub14_warmstart

data:
  data_dir: /lustre/work/vivatech-unaite/shared/tahoe-100m/data
  split: train
  streaming: true
  shuffle_buffer: 16384
  batch_size: 32
  num_workers: 6
  pin_mem: true
  max_cells: 0
  maps_path: /lustre/work/vivatech-unaite/shared/tahoe-cache/maps.pt
  num_bins: 16              # MUST match the trained checkpoint
  genes_per_bin: 32         # max_genes_per_cell = 512 (matches checkpoint)
  n_views: 4
  binomial_subsample:
    enabled: true
    p_min: 0.5
    p_max: 0.9

model:
  # EXACT trained size — required for the F_v4 weights to load.
  d_model: 512
  n_heads: 8
  n_layers: 6
  d_ff: 2048
  dropout: 0.1
  proj_dim: 128
  attention_activation: sigmoid
  freeze_features: true
  grad_checkpoint: true
  compile: true
  gene_emb_cache: /lustre/work/vivatech-unaite/shared/gene_emb_cache   # OUR Evo2+ESMC
  # Trained checkpoint to warm-start from (stage it here first; see sbatch header).
  warmstart_checkpoint: /lustre/work/vivatech-unaite/ljung/ckpt-import/subliminal_1_4_F_v4.pt

loss:
  sigreg_weight: 0.4
  jepa_loss: cosine
  sigreg_slices: 256
  sigreg_knots: 17
  sigreg_t_max: 3.0

optim:
  muon_lr: 2.0e-4
  muon_weight_decay: 0.1
  muon_momentum: 0.95
  muon_ns_steps: 5
  adamw_lr: 2.0e-4
  adamw_weight_decay: 0.0
  adamw_beta1: 0.9
  adamw_beta2: 0.95
  adamw_eps: 1.0e-8
  epochs: 100
  max_steps: 8000
  max_grad_norm: 1.0

training:
  native_bf16: true
  log_every: 25
  ckpt_every_steps: 1000
  max_minutes: 580

eval:
  enabled: true
  eval_every: 500
  eval_cells: 3000
  encode_chunk: 256
  perplexity: 30.0
  classes: [organ, cell_line_id, drug, moa_fine]

wandb:
  enabled: true
  entity: unaite
  project: hacktheworld
